{% extends "pages/sample-page.html" %}

{% block content %}
<div class="pc-container">
  <div class="pc-content">
    <div class="page-header">
      <div class="page-block">
        <div class="row align-items-center">
          <div class="col-md-12">
            <div class="page-header-title">
              <h5 class="m-b-10">Konfirmasi Hapus</h5>
            </div>
            <ul class="breadcrumb">
              <li class="breadcrumb-item"><a href="/">Home</a></li>
              <li class="breadcrumb-item active" aria-current="page">Hapus</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-12">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center py-5">
            <div class="mb-3">
              <i class="fas fa-trash-alt fa-3x text-danger"></i>
            </div>
            <h4 class="mb-3">Hapus Data</h4>
            <p class="text-muted">Apakah Anda yakin ingin menghapus data <strong>{{ object }}</strong>?</p>
            <form method="post" class="d-flex justify-content-center gap-2 mt-4">
              {% csrf_token %}
              <button type="submit" class="btn btn-danger">Ya, Hapus</button>
              <a href="{{ url_list }}" class="btn btn-outline-secondary">Batal</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
